<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PandaX AI Studio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .app-wrapper {
      height: 100%;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: linear-gradient(135deg, #0f0a1f 0%, #1a0e3f 25%, #0d1b35 75%, #0a1428 100%);
      position: relative;
    }

    .app-wrapper::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 80% -20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 45%),
        radial-gradient(ellipse at -10% 50%, rgba(236, 72, 153, 0.08) 0%, transparent 35%);
      pointer-events: none;
      z-index: 0;
    }

    .content-wrapper {
      position: relative;
      z-index: 1;
    }

    /* Glassmorphic Cards */
    .glass-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.4) 0%, rgba(30, 41, 59, 0.2) 100%);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .glass-card:hover {
      border-color: rgba(139, 92, 246, 0.4);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.5) 0%, rgba(30, 41, 59, 0.3) 100%);
      box-shadow: 0 12px 48px rgba(139, 92, 246, 0.15);
    }

    /* Premium Header */
    .premium-header {
      position: relative;
      padding: 40px 0 30px;
      text-align: center;
      overflow: hidden;
    }

    .premium-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .logo-badge {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 32px rgba(139, 92, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: floatAnim 4s ease-in-out infinite;
    }

    @keyframes floatAnim {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .title-text {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #8b5cf6 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin: 0;
    }

    .subtitle {
      color: rgba(148, 163, 184, 0.8);
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin: 8px 0 0;
    }

    /* Tool Grid */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 24px 0;
    }

    .tool-btn {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.05) 100%);
      border: 1.5px solid rgba(139, 92, 246, 0.2);
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .tool-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.2), transparent);
      transition: left 0.5s;
    }

    .tool-btn:active {
      transform: scale(0.96);
    }

    @media (hover: hover) {
      .tool-btn:hover {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(139, 92, 246, 0.12) 100%);
        border-color: rgba(139, 92, 246, 0.5);
        transform: translateY(-6px);
        box-shadow: 0 16px 40px rgba(139, 92, 246, 0.2);
      }

      .tool-btn:hover::before {
        left: 100%;
      }
    }

    .tool-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(139, 92, 246, 0.1);
      transition: all 0.3s;
    }

    .tool-btn:hover .tool-icon {
      background: rgba(139, 92, 246, 0.2);
      transform: scale(1.1);
    }

    .tool-label {
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .tool-desc {
      color: rgba(148, 163, 184, 0.6);
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* Input Styles */
    .input-section {
      margin: 24px 0;
    }

    .input-label {
      color: rgba(148, 163, 184, 0.7);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
    }

    .input-field {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      border: 1.5px solid rgba(139, 92, 246, 0.2);
      border-radius: 16px;
      padding: 16px;
      color: white;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      min-height: 120px;
      transition: all 0.3s ease;
      -webkit-appearance: none;
      -webkit-border-radius: 16px;
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.6);
      background: rgba(15, 23, 42, 0.95);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
    }

    .input-field::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .input-hint {
      font-size: 0.8rem;
      color: rgba(148, 163, 184, 0.6);
      margin-top: 10px;
    }

    /* Results */
    .results-section {
      margin-top: 28px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding: 0 4px;
    }

    .results-title {
      color: white;
      font-weight: 700;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pulse-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulseAnim 2s ease-in-out infinite;
    }

    @keyframes pulseAnim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.2); }
    }

    .clear-btn {
      background: transparent;
      color: rgba(148, 163, 184, 0.6);
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      padding: 6px 12px;
      border-radius: 8px;
    }

    .clear-btn:hover {
      color: rgba(148, 163, 184, 1);
      background: rgba(139, 92, 246, 0.1);
    }

    .result-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.6) 0%, rgba(30, 41, 59, 0.4) 100%);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 18px;
      padding: 20px;
      animation: slideUpCard 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-bottom: 12px;
    }

    @keyframes slideUpCard {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(59, 130, 246, 0.8);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .copy-btn {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.9) 0%, rgba(139, 92, 246, 0.9) 100%);
      color: white;
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-appearance: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .copy-btn:active {
      transform: scale(0.94);
    }

    @media (hover: hover) {
      .copy-btn:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      }
    }

    .result-content {
      color: rgba(229, 231, 235, 0.9);
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Inter', sans-serif;
    }

    /* Loading State */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.08) 100%);
      border: 1.5px solid rgba(139, 92, 246, 0.2);
      border-radius: 16px;
      animation: fadeInAnim 0.3s ease-out;
    }

    @keyframes fadeInAnim {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spinner-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: bounceAnim 1.4s ease-in-out infinite;
    }

    @keyframes bounceAnim {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8) translateY(0); }
      40% { opacity: 1; transform: scale(1) translateY(-8px); }
    }

    .dot:nth-child(1) { background: #3b82f6; animation-delay: 0s; }
    .dot:nth-child(2) { background: #8b5cf6; animation-delay: 0.2s; }
    .dot:nth-child(3) { background: #ec4899; animation-delay: 0.4s; }

    .loading-text {
      color: rgba(148, 163, 184, 0.8);
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 16px;
      right: 16px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 16px 20px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 12px 36px rgba(16, 185, 129, 0.35);
      animation: toastSlideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }

    @keyframes toastSlideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .title-text {
        font-size: 1.8rem;
      }

      .tool-grid {
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 10px;
      }

      .premium-header {
        padding: 28px 0 20px;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.3);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.4) 0%, rgba(139, 92, 246, 0.4) 100%);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.6) 0%, rgba(139, 92, 246, 0.6) 100%);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

  <script>
    // Default configuration
    const defaultConfig = {
      app_title: 'PandaX AI Studio',
      app_subtitle: 'AI-powered content generation suite',
      input_placeholder: 'Enter a topic, idea, or paste content...',
      primary_color: '#3b82f6',
      accent_color: '#8b5cf6',
      font_family: 'Inter'
    };

    // Generate content functions
    function generateTweetAbout(topic) {
      const templates = [
        `🚀 Just realized something about "${topic}"...\n\nMost people approach it all wrong.\n\nThe secret? Start with the outcome, not the process.\n\nOnce you understand what success looks like, everything else becomes obvious. 🎯`,
        `Hot take: "${topic}" isn't complicated.\n\nWe just make it that way.\n\nI spent 3 months optimizing this and found the answer was simpler than I thought.\n\nFocus on fundamentals first. 📈`,
        `Nobody talks about the real benefit of "${topic}"...\n\nIt's not about the end result.\n\nIt's about who you become in the process.\n\nThis shift changes everything. 🔥`,
        `If you're interested in "${topic}", here's what I wish I knew:\n\n1. Start small\n2. Track everything\n3. Iterate ruthlessly\n4. Stay consistent\n\nDo this for 90 days. 💪`,
        `The "${topic}" journey nobody discusses:\n\n→ Starts with confusion\n→ Then frustration\n→ Then a breakthrough\n→ Then mastery\n\nMost quit at step 2. Don't. 💎`
      ];
      return templates[Math.floor(Math.random() * templates.length)];
    }

    function generateReplyTo(topic) {
      const templates = [
        `This perspective on "${topic}" is pure gold 🔥\n\nI've been implementing similar ideas and seeing dramatic improvements.\n\nThe key insight is often overlooked—everyone sees the obvious, but the leverage is in the details.\n\nThanks for this!`,
        `Underrated take on "${topic}".\n\nMost people miss this because they're too deep in the weeds.\n\nOnce you zoom out and see the bigger picture, everything clicks.\n\nBookmarking this. 📌`,
        `This is exactly what I needed to hear about "${topic}" today.\n\nI was overcomplicating it, and your approach just simplified everything.\n\nTime to rebuild around this. 🙏`,
        `Couldn't agree more with this on "${topic}".\n\nToo many people get stuck on the surface level.\n\nYou've identified the real game-changer here. This deserves visibility.`,

    function generateViralHooks(topic) {

    // UI Update
    function updateUI(config) {
      const titleEl = document.getElementById('app-title');
      const subtitleEl = document.getElementById('app-subtitle');
      if (titleEl) titleEl.textContent = config.app_title || defaultConfig.app_title;
      if (subtitleEl) subtitleEl.textContent = config.app_subtitle || defaultConfig.app_subtitle;
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig: defaultConfig,
        onConfigChange: async (config) => {
          updateUI(config);
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['app_title', config.app_title || defaultConfig.app_title],
          ['app_subtitle', config.app_subtitle || defaultConfig.app_subtitle],
          ['footer_text', config.footer_text || '']
        ])
      });
    }

    // DOM Elements
    const userInput = document.getElementById('user-input');
    const resultsPanel = document.getElementById('results-panel');
    const resultsContainer = document.getElementById('results-container');
    const loadingIndicator = document.getElementById('loading-indicator');
    const clearResultsBtn = document.getElementById('clear-results');
    const toast = document.getElementById('toast');
    const toolButtons = document.querySelectorAll('[data-tool]');

    // Show toast
    function showToast() {
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2000);
    }

    // Copy to clipboard
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast();
      } catch (err) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast();
      }
    }

    // Create result card
    function createResultCard(content, toolName) {
      const card = document.createElement('div');
      card.className = 'result-card';
      const toolLabel = toolName.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
      
      card.innerHTML = `
        <div class="result-header">
          <span class="result-label">${toolLabel}</span>
          <button class="copy-btn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
            </svg>
            Copy
          </button>
        </div>
        <div class="result-content">${content}</div>
      `;
      
      card.querySelector('.copy-btn').addEventListener('click', () => copyToClipboard(content));
      return card;
    }

    // Generate content
    function generateContent(tool) {
      const userText = userInput.value.trim();
      
      if (!userText) {
        return '⚠️ Please enter a topic first!\n\nTry:\n• "AI productivity tips"\n• "Growing on Twitter"\n• "Morning routine hacks"\n\nThen select a tool to generate content!';
      }

      if (tool === 'generate-tweet') return `💡 Tweet about: "${userText}"\n\n${generateTweetAbout(userText)}`;
      if (tool === 'reply-lab') return `💬 Smart reply to: "${userText}"\n\n${generateReplyTo(userText)}`;
      if (tool === 'viral-hooks') return `🪝 Viral hooks for "${userText}":\n\n${generateViralHooks(userText)}`;
      if (tool === 'thread-architect') return `${generateThreadOutline(userText)}`;
      if (tool === 'content-studio') return `📱 Content ideas for "${userText}":\n\n${generateContentIdeas(userText)}`;
      if (tool === 'tweet-score') return `${generateTweetScore(userText)}`;
      if (tool === 'improve-tweet') return `✨ IMPROVING: "${userText}"\n\n${generateImprovement(userText)}`;
      if (tool === 'ideas-generator') return `💡 Content ideas about "${userText}":\n\n${generateIdeas(userText)}`;
    }

    // Handle tool click
    function handleToolClick(tool) {
      loadingIndicator.classList.remove('hidden');
      resultsPanel.classList.add('hidden');
      
      setTimeout(() => {
        const content = generateContent(tool);
        const card = createResultCard(content, tool);
        resultsContainer.insertBefore(card, resultsContainer.firstChild);
        loadingIndicator.classList.add('hidden');
        resultsPanel.classList.remove('hidden');
      }, 800 + Math.random() * 400);
    }

    // Event listeners
    toolButtons.forEach(btn => {
      btn.addEventListener('click', () => handleToolClick(btn.getAttribute('data-tool')));
    });

    clearResultsBtn.addEventListener('click', () => {
      resultsContainer.innerHTML = '';
      resultsPanel.classList.add('hidden');
    });

    updateUI(defaultConfig);
  </script>
