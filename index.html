<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PandaX AI Studio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Outfit:wght@300;400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    .app-wrapper {
      height: 100%;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: linear-gradient(180deg, #0a0e27 0%, #0f1335 15%, #1a1a3f 30%, #251a4f 50%, #1f1540 75%, #0d0820 100%);
      position: relative;
    }

    .app-wrapper::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse 800px 600px at 15% 30%, rgba(168, 85, 247, 0.2) 0%, transparent 40%),
        radial-gradient(ellipse 600px 700px at 85% 15%, rgba(59, 130, 246, 0.18) 0%, transparent 38%),
        radial-gradient(ellipse 700px 500px at 50% 95%, rgba(236, 72, 153, 0.12) 0%, transparent 42%),
        radial-gradient(circle 500px at 10% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: glowShift 10s ease-in-out infinite;
    }

    .app-wrapper::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 100% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 0% 100%, rgba(236, 72, 153, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes glowShift {
      0%, 100% {
        opacity: 1;
        filter: blur(40px);
      }
      50% {
        opacity: 1.15;
        filter: blur(50px);
      }
    }

    .content-wrapper {
      position: relative;
      z-index: 1;
    }

    /* Glassmorphic Cards */
    .glass-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.35) 0%, rgba(30, 41, 59, 0.2) 100%);
      backdrop-filter: blur(80px);
      -webkit-backdrop-filter: blur(80px);
      border: 1.5px solid rgba(168, 85, 247, 0.35);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.2),
        0 0 60px rgba(168, 85, 247, 0.05),
        inset 0 1px 20px rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.12) 0%, transparent 50%),
        linear-gradient(135deg, rgba(168, 85, 247, 0.05) 0%, transparent 100%);
      pointer-events: none;
    }

    .glass-card:hover {
      border-color: rgba(168, 85, 247, 0.6);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.5) 0%, rgba(30, 41, 59, 0.35) 100%);
      box-shadow: 
        0 20px 60px rgba(168, 85, 247, 0.3),
        0 0 80px rgba(168, 85, 247, 0.1),
        inset 0 1px 20px rgba(255, 255, 255, 0.2);
      transform: translateY(-6px);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.320, 1);
    }

    /* Premium Header */
    .premium-header {
      position: relative;
      padding: 60px 0 50px;
      text-align: center;
      overflow: hidden;
    }

    .premium-header::before {
      content: '';
      position: absolute;
      top: -80%;
      left: 50%;
      transform: translateX(-50%);
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, transparent 60%);
      filter: blur(120px);
      pointer-events: none;
      animation: pulse-glow 12s ease-in-out infinite;
    }

    .premium-header::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
      filter: blur(100px);
      pointer-events: none;
      animation: pulse-glow 15s ease-in-out infinite 2s;
    }

    @keyframes pulse-glow {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        opacity: 0.8;
      }
      50% {
        transform: translateX(-50%) scale(1.1);
        opacity: 1;
      }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 50px;
      position: relative;
      z-index: 1;
      animation: fadeInDown 0.8s cubic-bezier(0.23, 1, 0.320, 1);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-badge {
      width: 120px;
      height: 120px;
      border-radius: 32px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 24px 48px rgba(139, 92, 246, 0.5),
        0 0 60px rgba(168, 85, 247, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset -2px -2px 8px rgba(0,0,0,0.2);
      animation: floatAnim 5s ease-in-out infinite;
      border: 1.5px solid rgba(255,255,255,0.25);
      position: relative;
    }

    .logo-badge::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
      filter: blur(8px);
      z-index: -1;
    }

    @keyframes floatAnim {
      0%, 100% { transform: translateY(0px) rotateZ(0deg); }
      50% { transform: translateY(-20px) rotateZ(3deg); }
    }

    .title-text {
      font-family: 'Space Grotesk', 'Outfit', 'Plus Jakarta Sans', sans-serif;
      font-size: 6.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 35%, #ec4899 70%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin: 0;
      animation: fadeInDown 1.2s cubic-bezier(0.23, 1, 0.320, 1) 0.1s both;
      text-shadow: 0 20px 40px rgba(168, 85, 247, 0.2);
    }

    .subtitle {
      color: rgba(148, 163, 184, 0.95);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.6px;
      margin: 18px 0 0;
      animation: fadeInDown 1.2s cubic-bezier(0.23, 1, 0.320, 1) 0.25s both;
      background: linear-gradient(135deg, rgba(148, 163, 184, 0.9) 0%, rgba(203, 213, 225, 0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tool Grid */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 16px;
      margin: 40px 0;
      animation: fadeInUp 1.2s cubic-bezier(0.23, 1, 0.320, 1) 0.4s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tool-btn {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.12) 0%, rgba(139, 92, 246, 0.12) 100%);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: 1.5px solid rgba(168, 85, 247, 0.3);
      border-radius: 26px;
      padding: 22px;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.320, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.15),
        0 0 40px rgba(168, 85, 247, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .tool-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.3), transparent);
      transition: left 0.7s;
    }

    .tool-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08) 0%, transparent 50%),
        linear-gradient(135deg, transparent 0%, rgba(168, 85, 247, 0.05) 100%);
      pointer-events: none;
    }

    .tool-btn:active {
      transform: scale(0.92);
    }

    @media (hover: hover) {
      .tool-btn:hover {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.25) 0%, rgba(139, 92, 246, 0.25) 100%);
        border-color: rgba(168, 85, 247, 0.65);
        transform: translateY(-10px);
        box-shadow: 
          0 28px 60px rgba(168, 85, 247, 0.35),
          0 0 60px rgba(168, 85, 247, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      .tool-btn:hover::before {
        left: 100%;
      }
    }

    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.25) 0%, rgba(59, 130, 246, 0.15) 100%);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.320, 1);
      border: 1.5px solid rgba(168, 85, 247, 0.3);
      box-shadow: 
        0 8px 24px rgba(168, 85, 247, 0.15),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .tool-btn:hover .tool-icon {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.5) 0%, rgba(59, 130, 246, 0.35) 100%);
      transform: scale(1.2) rotateZ(8deg);
      border-color: rgba(168, 85, 247, 0.6);
      box-shadow: 
        0 12px 32px rgba(168, 85, 247, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .tool-label {
      color: white;
      font-weight: 800;
      font-size: 1rem;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }

    .tool-desc {
      color: rgba(148, 163, 184, 0.75);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* Input Styles */
    .input-section {
      margin: 36px 0;
      animation: fadeInUp 1.2s cubic-bezier(0.23, 1, 0.320, 1) 0.3s both;
    }

    .input-label {
      color: rgba(203, 213, 225, 0.9);
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
      background: linear-gradient(135deg, rgba(148, 163, 184, 0.9) 0%, rgba(203, 213, 225, 0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .input-field {
      width: 100%;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.5) 0%, rgba(30, 41, 59, 0.3) 100%);
      backdrop-filter: blur(70px);
      -webkit-backdrop-filter: blur(70px);
      border: 1.5px solid rgba(168, 85, 247, 0.3);
      border-radius: 22px;
      padding: 22px;
      color: white;
      font-size: 1rem;
      font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
      resize: vertical;
      min-height: 160px;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.320, 1);
      -webkit-appearance: none;
      -webkit-border-radius: 22px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.2),
        0 0 40px rgba(168, 85, 247, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(168, 85, 247, 0.7);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.7) 0%, rgba(30, 41, 59, 0.4) 100%);
      box-shadow: 
        0 0 0 6px rgba(168, 85, 247, 0.2),
        0 16px 48px rgba(168, 85, 247, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.15);
      transform: translateY(-3px);
    }

    .input-field::placeholder {
      color: rgba(148, 163, 184, 0.55);
    }

    .input-hint {
      font-size: 0.9rem;
      color: rgba(148, 163, 184, 0.7);
      margin-top: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* Results */
    .results-section {
      margin-top: 40px;
      animation: fadeInUp 1.2s cubic-bezier(0.23, 1, 0.320, 1) 0.5s both;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .results-title {
      color: white;
      font-weight: 900;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ffffff 0%, rgba(229, 231, 235, 0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pulse-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      animation: pulseAnim 2s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
    }

    @keyframes pulseAnim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .clear-btn {
      background: transparent;
      color: rgba(203, 213, 225, 0.85);
      border: 1.5px solid rgba(168, 85, 247, 0.3);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
      padding: 10px 18px;
      border-radius: 12px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.1);
      letter-spacing: 0.3px;
    }

    .clear-btn:hover {
      color: white;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(59, 130, 246, 0.1) 100%);
      border-color: rgba(168, 85, 247, 0.5);
      box-shadow: 
        0 12px 32px rgba(168, 85, 247, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.15);
      transform: translateY(-3px);
    }

    .result-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.4) 0%, rgba(30, 41, 59, 0.25) 100%);
      backdrop-filter: blur(80px);
      -webkit-backdrop-filter: blur(80px);
      border: 1.5px solid rgba(168, 85, 247, 0.2);
      border-radius: 24px;
      padding: 28px;
      animation: slideUpCard 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-bottom: 18px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.2),
        0 0 50px rgba(168, 85, 247, 0.06),
        inset 0 1px 20px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 100% 0%, rgba(255,255,255,0.1) 0%, transparent 50%),
        linear-gradient(135deg, rgba(168, 85, 247, 0.05) 0%, transparent 100%);
      pointer-events: none;
    }

    @keyframes slideUpCard {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
    }

    .result-label {
      font-size: 0.8rem;
      font-weight: 900;
      color: rgba(59, 130, 246, 1);
      text-transform: uppercase;
      letter-spacing: 1.8px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .copy-btn {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.9) 0%, rgba(139, 92, 246, 0.9) 100%);
      color: white;
      border: 1.5px solid rgba(168, 85, 247, 0.7);
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-appearance: none;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 
        0 12px 32px rgba(59, 130, 246, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.25);
      letter-spacing: 0.3px;
    }

    .copy-btn:active {
      transform: scale(0.90);
    }

    @media (hover: hover) {
      .copy-btn:hover {
        transform: scale(1.12) translateY(-3px);
        box-shadow: 
          0 20px 48px rgba(59, 130, 246, 0.6),
          inset 0 1px 0 rgba(255,255,255,0.3);
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        border-color: rgba(255, 255, 255, 0.4);
      }
    }

    .result-content {
      color: rgba(229, 231, 235, 0.97);
      font-size: 1rem;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    /* Loading State */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.12) 0%, rgba(139, 92, 246, 0.12) 100%);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: 1.5px solid rgba(168, 85, 247, 0.3);
      border-radius: 24px;
      animation: fadeInAnim 0.5s cubic-bezier(0.23, 1, 0.320, 1);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.2),
        0 0 40px rgba(168, 85, 247, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    @keyframes fadeInAnim {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spinner-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: bounceAnim 1.4s ease-in-out infinite;
      box-shadow: 0 0 16px currentColor;
    }

    @keyframes bounceAnim {
      0%, 80%, 100% { opacity: 0.4; transform: scale(0.8) translateY(0); }
      40% { opacity: 1; transform: scale(1) translateY(-12px); }
    }

    .dot:nth-child(1) { background: #3b82f6; color: #3b82f6; animation-delay: 0s; }
    .dot:nth-child(2) { background: #8b5cf6; color: #8b5cf6; animation-delay: 0.2s; }
    .dot:nth-child(3) { background: #ec4899; color: #ec4899; animation-delay: 0.4s; }

    .loading-text {
      color: rgba(203, 213, 225, 0.95);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      background: linear-gradient(135deg, rgba(148, 163, 184, 0.95) 0%, rgba(203, 213, 225, 0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 16px;
      right: 16px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 16px 22px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 
        0 16px 40px rgba(16, 185, 129, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.2);
      animation: toastSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    @keyframes toastSlideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .title-text {
        font-size: 1.8rem;
      }

      .tool-grid {
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 10px;
      }

      .premium-header {
        padding: 28px 0 20px;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.3);
    }

    function generateHashtags(topic) {

      const base = words[0] || 'content';

      const hashtags = [

    function createResultCard(content, toolName) {
      const card = document.createElement('div');
      card.className = 'result-card';
      const toolLabel = toolName.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      
      card.innerHTML = `
        <div class="result-header">
          <span class="result-label">${toolLabel}</span>
          <button class="copy-btn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

            </svg>
            Copy
          </button>
        </div>
        <div class="result-content">${content}</div>
      `;
      
      card.querySelector('.copy-btn').addEventListener('click', () => copyToClipboard(content));
      return card;
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast();
      } catch (err) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast();
      }
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2000);
    }

      resultsContainer.innerHTML = '';
      document.getElementById('results-panel').classList.add('hidden');
    });

    toolButtons.forEach(btn => {
      btn.addEventListener('click', async () => {
        const tool = btn.dataset.tool;
        const userText = userInput.value.trim();

        if (!userText) {
          alert('Please enter a topic first!');
          return;
        }

        loadingIndicator.classList.remove('hidden');

        setTimeout(() => {
          let content = '';
          
          if (tool === 'generate-tweet') {
            content = generateTweetAbout(userText);
          } else if (tool === 'reply-lab') {
            content = generateReply(userText);
          } else if (tool === 'viral-hooks') {
            content = generateHooks(userText);
          } else if (tool === 'thread-architect') {
            content = generateThread(userText);
          } else if (tool === 'hashtag-generator') {
            content = generateHashtags(userText);
          } else if (tool === 'tweet-score') {
            content = generateScore(userText);
          } else if (tool === 'ab-variations') {
            content = generateABVariations(userText);
          } else if (tool === 'ideas-generator') {
            content = generateIdeas(userText);
          } else {
            content = `${tool.replace(/-/g, ' ')}: ${userText}`;
          }

          const card = createResultCard(content, tool);
          resultsContainer.insertBefore(card, resultsContainer.firstChild);
          loadingIndicator.classList.add('hidden');
          document.getElementById('results-panel').classList.remove('hidden');
        }, 600 + Math.random() * 400);
      });
    });

    updateUI(defaultConfig);
